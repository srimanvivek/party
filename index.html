<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#fff5f7,#ffe4ec,#fff8f0);
    position:relative;
}

/* Floating Balloons */
.balloon{
    position:absolute;
    bottom:-150px;
    width:70px;
    height:90px;
    border-radius:50%;
    opacity:.8;
    animation:floatUp linear infinite;
}

.balloon::after{
    content:"";
    position:absolute;
    width:2px;
    height:80px;
    background:#999;
    left:50%;
    top:90px;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* Main Card */
.card{
    width:min(90%,750px);
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(12px);
    border-radius:30px;
    padding:40px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
    z-index:10;
}

h1{
    font-size:3rem;
    color:#d46a92;
    margin-bottom:15px;
}

.subtitle{
    color:#666;
    font-size:1.1rem;
    line-height:1.8;
    margin-bottom:25px;
}

.question{
    font-size:1.4rem;
    font-weight:600;
    color:#b85f81;
    margin-bottom:30px;
}

.btn-container{
    position:relative;
    height:180px;
}

button{
    border:none;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    background:linear-gradient(135deg,#ff7aa8,#ff5e95);
    color:white;
    padding:15px 40px;
    border-radius:50px;
    font-size:1.2rem;
    font-weight:600;
    box-shadow:0 8px 20px rgba(255,94,149,.35);
}

#yesBtn:hover{
    transform:translateY(-3px);
}

#noBtn{
    position:absolute;
    left:60%;
    top:0;
    background:#f1f1f1;
    color:#555;
    padding:15px 35px;
    border-radius:50px;
    font-size:1.1rem;
}

.success{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,.97);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.success h2{
    font-size:3rem;
    color:#ff5e95;
    margin-bottom:15px;
    animation:pop .7s ease;
}

.success p{
    font-size:1.3rem;
    color:#666;
}

@keyframes pop{
    from{
        transform:scale(.4);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* Confetti */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-20px;
    z-index:1000;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>
<body>

<!-- Balloons -->
<script>
for(let i=0;i<18;i++){
    const b=document.createElement("div");
    b.classList.add("balloon");
    b.style.left=Math.random()*100+"vw";
    b.style.background=`hsl(${Math.random()*360},80%,75%)`;
    b.style.animationDuration=(8+Math.random()*8)+"s";
    b.style.animationDelay=(Math.random()*5)+"s";
    document.body.appendChild(b);
}
</script>

<div class="card">
    <h1>🎂 Happy Birthday! 🎂</h1>

    <p class="subtitle">
        Wishing you a day filled with happiness, laughter, sweet surprises,
        and countless beautiful memories. 💖<br><br>
        <i>[Write your personalized birthday message here]</i>
    </p>

    <div class="question">
        🎉 Are you treating me to a birthday party? 🎉
    </div>

    <div class="btn-container">
        <button id="yesBtn">Yes 💕</button>
        <button id="noBtn">No 🙈</button>
    </div>
</div>

<div class="success" id="successScreen">
    <h2>🎊 Yay! I knew you'd say yes! 🎊</h2>
    <p>Can't wait! 🍰✨</p>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const success = document.getElementById("successScreen");

let yesScale = 1;

function moveNoButton(){
    const container = document.querySelector(".btn-container");

    const maxX = container.clientWidth - noBtn.offsetWidth;
    const maxY = container.clientHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    yesScale += 0.15;
    yesBtn.style.transform = `scale(${yesScale})`;
}

noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("click", moveNoButton);

yesBtn.addEventListener("click", () => {
    success.style.display = "flex";
    createConfetti();
});

function createConfetti(){
    const colors = [
        "#ff5e95",
        "#ffd166",
        "#06d6a0",
        "#118ab2",
        "#ef476f",
        "#ff9f1c",
        "#c77dff"
    ];

    for(let i=0;i<250;i++){
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random()*100+"vw";
        confetti.style.background =
            colors[Math.floor(Math.random()*colors.length)];

        confetti.style.width = (6 + Math.random()*10)+"px";
        confetti.style.height = (6 + Math.random()*10)+"px";

        confetti.style.animationDuration =
            (2 + Math.random()*3)+"s";

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}
</script>

</body>
</html>
